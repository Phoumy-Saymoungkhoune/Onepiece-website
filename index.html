<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One Piece Characters</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body>

    <header>
      <h1>🏴‍☠️ One Piece Characters</h1>
      <p>Discover characters from the One Piece world</p>
      <button id="theme-toggle">🌙 Dark mode</button>
    </header>

    <main>

      <!-- Search, filter & sort -->
      <section class="controls">
        <input type="text" id="zoekbalk" placeholder="Search a character..." />

        <select id="filter-crew">
          <option value="all">All crews</option>
        </select>

        <select id="filter-status">
          <option value="all">All statuses</option>
          <option value="living">Alive</option>
          <option value="deceased">Deceased</option>
        </select>

        <select id="filter-fruit">
          <option value="all">All characters</option>
          <option value="ja">Has Devil Fruit</option>
          <option value="nee">No Devil Fruit</option>
        </select>

        <select id="sorteer">
          <option value="naam-az">Name A-Z</option>
          <option value="naam-za">Name Z-A</option>
          <option value="bounty-hoog">Bounty ↓</option>
          <option value="bounty-laag">Bounty ↑</option>
        </select>
      </section>

      <!-- Characters grid -->
      <section id="karakters-container"></section>

      <!-- Favorites -->
      <section id="favorieten-sectie">
        <h2>⭐ My Favorites</h2>
        <div id="favorieten-container"></div>
      </section>

    </main>

    <footer>
      <p>Made with ❤️ | Data via One Piece API</p>
    </footer>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
